<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIXHUB PRO - TLB Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0b0e14;
            --card-bg: #161b22;
            --text: #e6edf3;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -1px; }
        h1 span { color: var(--primary); }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .mix-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #30363d;
            transition: 0.3s;
            text-align: center;
        }

        .mix-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .genre { 
            color: var(--primary); 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        h3 { margin: 15px 0; font-size: 1.5rem; }
        p { color: #8b949e; margin-bottom: 25px; }

        .btn {
            background: var(--primary);
            color: #000;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #fff;
        }
    </style>
</head>
<body>

<header>
    <h1>MIX<span>HUB</span> PRO</h1>
    <p>A te kedvenc szettjeid egy helyen.</p>
</header>

<div class="container">
    
    <div class="mix-card">
        <div class="genre">House / Cleaning Mix</div>
        <h3>Tvaruska - TLB for Home Cleaning Vol. 1</h3>
        <p>Tökéletes ütemek a takarításhoz vagy kikapcsolódáshoz.</p>
        
        <a href="https://www.mixcloud.com/tvaruska/tlb-for-home-cleaning-vol-1/" target="_blank" class="btn">HALLGATÁS MIXCLOUDON</a>
    </div>

</div>

</body>
</html>
